name: Sync Nib Engine

on:
  push:
    branches: [main]
    paths:
      - 'src/lib/engine/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout The Work
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push engine directory to Nib repo
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.NIB_SYNC_TOKEN }}
          external_repository: JasonWarrenUK/nib
          publish_dir: ./src/lib/engine
          publish_branch: main
          commit_message: "sync: update from The Work@${{ github.sha }}"
          enable_jekyll: true
